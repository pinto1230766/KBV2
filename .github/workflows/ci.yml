name: CI/CD Pipeline - Strict Checks

# ============================================================================
# STRICT CI PIPELINE - Toutes les vérifications sont BLOQUANTES pour les merges
# Checklist obligatoire: lint, type-check, tests unitaires, build
# ============================================================================

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'
  CI: true

jobs:
  # Job de linting et formatage
  lint:
    name: 🔍 Linting & Formatting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🎨 Check Prettier formatting
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,json}"

      - name: 🔍 Run ESLint (max-warnings=0)
        run: npx eslint "src/**/*.{js,jsx,ts,tsx}" --max-warnings 0

      - name: 📝 Type check (strict)
        run: npx tsc --noEmit --strict

  # Job des tests unitaires
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests with coverage
        run: npm run test:coverage

      - name: 📊 Check coverage thresholds
        run: |
          echo "Checking coverage thresholds..."
          # Coverage thresholds are defined in vitest.config.ts
          # Lines: 70%, Functions: 70%, Branches: 70%, Statements: 70%

      - name: 📊 Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # Job des tests E2E Playwright
  test-e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, build]
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 🦥 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🎭 Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: 📸 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 📋 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # Job de build avec analyse
  build:
    name: 🏗️ Build & Analyze
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📊 Bundle Analysis
        run: |
          npm run build:analyze || echo "Bundle analysis not configured"

      - name:  Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/

      - name: 📊 Upload bundle stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-stats
          path: |
            dist/
            *.json
            *.html

  # Job de tests Storybook
  storybook-test:
    name: 📖 Storybook Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🏗️ Build Storybook
        run: npm run build-storybook
        continue-on-error: true

      - name: 📖 Upload Storybook
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 30

  # Job de sécurité
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=moderate

      - name: 🔍 Run SonarQube Scan
        run: |
          # Installation SonarScanner si nécessaire
          npm install -g sonarqube-scanner || true
          # Configuration SonarQube (optionnel)
          echo "SonarQube scan would run here with token: ${{ secrets.SONAR_TOKEN }}"

  # Job de déploiement (si besoin)
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍊 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/

      - name: 📥 Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: 📥 Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: � Deploy to production
        run: |
          echo "🚀 Déploiement en production..."
          # Ajouter ici votre logique de déploiement (Vercel, Netlify, etc.)
          # echo "Deploying to ${{ secrets.DEPLOY_TARGET }}"
          # npm run deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: 📢 Notify deployment
        run: |
          echo "✅ Déploiement terminé avec succès!"
          # Notifications Slack, Discord, etc.

  # ============================================================================
  # JOB OBLIGATOIRE POUR LES MERGES
  # Ce job doit passer pour autoriser un merge sur main/develop
  # Configurer dans GitHub: Settings > Branches > Branch protection rules
  # ============================================================================
  required-checks:
    name: ✅ Required Checks (Blocking)
    runs-on: ubuntu-latest
    needs: [lint, test-unit, build]
    if: always()

    steps:
      - name: ✅ Check all required jobs
        run: |
          echo "=== CI CHECKLIST ==="
          echo "1. 🔍 Lint & Type-check: ${{ needs.lint.result }}"
          echo "2. 🧪 Unit Tests: ${{ needs.test-unit.result }}"
          echo "3. 🏗️ Build: ${{ needs.build.result }}"
          echo "===================="
          
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ LINT FAILED - Merge blocked"
            exit 1
          fi
          
          if [ "${{ needs.test-unit.result }}" != "success" ]; then
            echo "❌ UNIT TESTS FAILED - Merge blocked"
            exit 1
          fi
          
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ BUILD FAILED - Merge blocked"
            exit 1
          fi
          
          echo "✅ All required checks passed - Merge allowed"

  # Job de release automatique
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Generate changelog
        id: changelog
        run: |
          # Générer un changelog automatique
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🏷️ Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## 🎉 Nouvelle Release KBV Lyon
            
            ### 📝 Changelog
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### 📊 Métriques de qualité
            - ✅ Tests unitaires: Passés
            - ✅ Tests E2E: Passés  
            - ✅ Build: Réussi
            - ✅ Sécurité: Validée
            
            ### 🔗 Assets
            - Build: https://github.com/pinto1230766/KBV2/actions
            - Docs: https://pinto1230766.github.io/KBV2/
            - Tests: https://github.com/pinto1230766/KBV2/actions
          draft: false
          prerelease: false
